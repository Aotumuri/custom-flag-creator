<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom Flag SVG</title>
    <meta name="description" content="Standalone SVG view for a shared custom flag." />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
      }

      body {
        overflow: hidden;
      }

      #svg-root {
        width: 100%;
        height: 100%;
      }

      .standalone-flag {
        display: block;
        width: 100%;
        height: 100%;
      }

      #svg-status {
        position: fixed;
        inset: auto 12px 12px 12px;
        margin: 0;
        color: #b00020;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <main id="svg-root" aria-label="Custom flag SVG"></main>
    <p id="svg-status" hidden aria-live="polite"></p>
    <script type="module" src="../app/standalone-svg.js"></script>
  </body>
</html>
